
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bible Verse Search App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2.5rem;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
    background:#f8fafc;
    color:#111827;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.examples{
    margin-top:15px;
    color:#cbd5e1;
    font-size:14px;
}

.result{
    margin-top:30px;
    background:white;
    color:#111827;
    padding:25px;
    border-radius:18px;
    display:none;
    animation:fadeIn 0.5s ease;
}

.result h2{
    color:#2563eb;
    margin-bottom:15px;
}

.verse-text{
    font-size:18px;
    line-height:1.8;
    margin-bottom:15px;
}

.translation{
    color:#64748b;
    font-style:italic;
}

.loading{
    margin-top:20px;
    text-align:center;
    display:none;
}

.error{
    background:#fee2e2;
    color:#b91c1c;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    display:none;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    .search-box{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    h1{
        font-size:2rem;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1>📖 Bible Verse Search</h1>

    <p class="subtitle">
        Search and explore Bible verses instantly
    </p>

    <div class="search-box">

        <input 
            type="text" 
            id="searchInput"
            placeholder="Enter verse e.g. John 3:16"
        >

        <button onclick="searchBible()">
            Search
        </button>

    </div>

    <div class="examples">
        Examples:
        John 3:16,
        Psalm 23:1,
        Romans 8:28,
        Genesis 1:1
    </div>

    <div class="loading" id="loading">
        Searching verse...
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">

        <h2 id="reference"></h2>

        <p class="verse-text" id="verseText"></p>

        <p class="translation" id="translation"></p>

    </div>

    <div class="footer">
        Powered by Bible API
    </div>

</div>

<script>

const input = document.getElementById("searchInput");

input.addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        searchBible();
    }
});

async function searchBible(){

    const query = input.value.trim();

    const result = document.getElementById("result");
    const error = document.getElementById("error");
    const loading = document.getElementById("loading");

    result.style.display = "none";
    error.style.display = "none";

    if(query === ""){
        error.innerHTML = "Please enter a Bible verse.";
        error.style.display = "block";
        return;
    }

    loading.style.display = "block";

    try{

        const response = await fetch(
            "https://bible-api.com/" + encodeURIComponent(query)
        );

        const data = await response.json();

        loading.style.display = "none";

        if(data.error){

            error.innerHTML = "Verse not found. Please check your reference.";
            error.style.display = "block";

        }else{

            document.getElementById("reference").innerHTML =
                data.reference;

            document.getElementById("verseText").innerHTML =
                data.text;

            document.getElementById("translation").innerHTML =
                "Translation: " + data.translation_name;

            result.style.display = "block";

        }

    }catch(err){

        loading.style.display = "none";

        error.innerHTML =
            "An error occurred while searching. Please try again.";

        error.style.display = "block";

        console.error(err);

    }

}

</script>

</body>
</html>
